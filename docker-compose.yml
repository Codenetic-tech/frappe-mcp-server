version: '3.8'

services:
  frappe-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frappe-mcp-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      # General configuration
      - NODE_ENV=production
      - MCP_PORT=4000
      - MCP_HOST=0.0.0.0

      # Frappe instance credentials (Only uncomment & configure if running in single-tenant mode)
      # - FRAPPE_URL=http://your-frappe-instance.com
      # - FRAPPE_API_KEY=your_api_key
      # - FRAPPE_API_SECRET=your_api_secret

      # Multi-tenant config (Optional: if you want to also support static multi-tenant list)
      # - SITES_CONFIG_PATH=/app/mcp-sites.json

    # Run the SSE server which supports both dynamic credentials and multi-tenancy
    command: node multitenant-server-sse.cjs
    # volumes:
    #   - ./mcp-sites.json:/app/mcp-sites.json
